server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the runtime config or the HTML shell (so redeploys take effect)
    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Long-cache fingerprint-free static assets (acceptable for this demo)
    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback (hash routing, but keep clean 404→index behaviour)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # lightweight healthcheck for Coolify
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;
}
